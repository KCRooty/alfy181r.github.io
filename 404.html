<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · ALFY STUDIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--text:#cdd6e0;--dim:#6b7e96;
  --bright:#e8f0f7;--accent:#5294e2;
  --red:#e0656e;--green:#4ec9b0;
  --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(82,148,226,.05) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none;
}
.terminal{
  position:relative;z-index:1;
  width:min(600px,100%);
  background:#0a0e14;
  border:1px solid #1e2b3a;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 0 60px rgba(82,148,226,.08);
}
.terminal-bar{
  background:#111820;
  border-bottom:1px solid #1e2b3a;
  padding:.6rem 1rem;
  display:flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:.7rem;color:var(--dim);
}
.dots{display:flex;gap:5px}
.dots span{width:10px;height:10px;border-radius:50%;display:block}
.d-r{background:#e0656e}.d-y{background:#d4ac67}.d-g{background:#4ec9b0}
.tb-title{margin-left:4px}
.terminal-body{padding:1.5rem 1.5rem 2rem;font-family:var(--mono);font-size:.82rem;line-height:2}
.line-prompt{color:var(--accent)}
.line-prompt .at{color:var(--green)}
.line-prompt .sep{color:var(--dim)}
.line-prompt .path{color:var(--bright)}
.line-cmd{color:var(--text)}
.line-err{color:var(--red)}
.line-err .code{font-weight:700}
.line-hint{color:var(--dim);margin-top:.5rem}
.line-hint a{color:var(--accent);text-decoration:none;transition:color .18s}
.line-hint a:hover{color:#7ab3ec}
.cursor{
  display:inline-block;width:8px;height:1.1em;
  background:var(--accent);vertical-align:text-bottom;
  animation:blink 1.1s step-end infinite;margin-left:2px;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.bottom-link{
  margin-top:2rem;position:relative;z-index:1;
  font-family:var(--mono);font-size:.72rem;color:var(--dim);
}
.bottom-link a{
  color:var(--accent);text-decoration:none;
  border:1px solid #1e2b3a;padding:6px 14px;border-radius:4px;
  transition:all .2s;display:inline-block;
}
.bottom-link a:hover{border-color:var(--accent);background:rgba(82,148,226,.08)}
</style>
</head>
<body>

<div class="terminal">
  <div class="terminal-bar">
    <div class="dots">
      <span class="d-r"></span>
      <span class="d-y"></span>
      <span class="d-g"></span>
    </div>
    <span class="tb-title">alfy@studio — bash</span>
  </div>
  <div class="terminal-body">
    <div>
      <span class="line-prompt">
        <span class="at">alfy</span><span class="sep">@</span><span class="path">studio</span><span class="sep">:~$</span>
      </span>
      <span class="line-cmd"> cd <span id="path-display"></span></span>
    </div>
    <div class="line-err">
      <span class="code">bash:</span> <span id="err-path"></span>: No such file or directory
    </div>
    <div class="line-hint">
      → la ruta que buscas no existe en este servidor.<br>
      → <a href="/">volver a home</a> · <a href="/index.html#projects">ver proyectos</a><span class="cursor"></span>
    </div>
  </div>
</div>

<div class="bottom-link">
  <a href="/">← alfy@studio · home</a>
</div>

<script>
const raw = window.location.pathname;
document.getElementById('path-display').textContent = raw;
document.getElementById('err-path').textContent = raw;
</script>
</body>
</html>
